<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablo — Mini Board Games</title>
  <link rel="icon" type="image/svg+xml" href="./assets/images/favicon.svg">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/icons.css">
  <meta name="theme-color" content="#0f1923">
  <meta name="description" content="Relax with classic board games. Sudoku, Connect 4, Memory Match, and more. All work offline.">
</head>
<body class="landing-page">

  <div id="tablo-header"></div>

  <section class="hero" style="margin-top:56px;">
    <img src="./assets/images/favicon.svg" alt="Tablo" class="hero-logo" />
    <h1 data-i18n="site_title">Tablo</h1>
    <p data-i18n="site_tagline">Mini board games for quiet moments</p>
  </section>

  <section class="container" style="margin-top:1rem;">
  <p class="game-intro" data-i18n="games_intro">Relax with classic board games. All work offline.</p>
</section>

  <section class="container">
    <div class="games-grid">

      <a href="./games/memory-match/index.html" class="game-card">
        <div class="game-icon"><i class="fa fa-lightbulb-o"></i></div>
        <div class="game-info">
          <h3 class="game-name" data-i18n="game_memory_name">Memory Match</h3>
          <p class="game-desc" data-i18n="game_memory_desc">Find matching cards</p>
        </div>
      </a>

      <a href="#" class="game-card coming-soon">
        <div class="game-icon"><i class="fa fa-bars"></i></div>
        <div class="game-info">
          <h3 class="game-name" data-i18n="game_connect4_name">Connect 4</h3>
          <p class="game-desc" data-i18n="game_connect4_desc">Four in a row</p>
        </div>
        <span class="badge" data-i18n="badge_coming_soon">Soon</span>
      </a>

      <a href="#" class="game-card coming-soon">
        <div class="game-icon"><i class="fa fa-square-o"></i></div>
        <div class="game-info">
          <h3 class="game-name" data-i18n="game_sudoku_name">Sudoku</h3>
          <p class="game-desc" data-i18n="game_sudoku_desc">Classic number puzzle</p>
        </div>
        <span class="badge" data-i18n="badge_coming_soon">Soon</span>
      </a>

      <a href="#" class="game-card coming-soon">
        <div class="game-icon"><i class="fa fa-dot-circle-o"></i></div>
        <div class="game-info">
          <h3 class="game-name" data-i18n="game_dots_name">Dots & Lines</h3>
          <p class="game-desc" data-i18n="game_dots_desc">Draw and connect</p>
        </div>
        <span class="badge" data-i18n="badge_coming_soon">Soon</span>
      </a>

    </div>
  </section>

  <div id="tablo-footer"></div>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/header.js"></script>
  <script src="./assets/js/footer.js"></script>

  <script>
    fetch('./assets/js/translations.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        window.TABLO_TRANSLATIONS = data;
        if (typeof window.applyTabloTranslations === 'function') {
          window.applyTabloTranslations();
        }
      })
      .catch(function(e) { console.error('Failed to load translations:', e); });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(registration) {
            console.log('SW registered:', registration.scope);
          })
          .catch(function(error) {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>

</body>
</html>
