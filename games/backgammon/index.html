<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backgammon — Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <svg style="display: none;" aria-hidden="true">
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/><path d="M12 20v2"/>
      <path d="M2 12h2"/><path d="M20 12h2"/>
      <path d="M4.9 4.9l1.4 1.4"/><path d="M17.7 17.7l1.4 1.4"/>
      <path d="M4.9 19.1l1.4-1.4"/><path d="M17.7 6.3l1.4-1.4"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </symbol>
    <symbol id="icon-dice" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
    </symbol>
  </svg>

  <div class="game-wrapper">
    <div class="bg-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="bg_turn">Turn</span>
        <span class="stat-value" id="turn-value">1</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="bg_off">Borne Off</span>
        <span class="stat-value" id="off-display">0 / 0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="bg_wins">Wins</span>
        <span class="stat-value" id="wins-count">0</span>
      </div>
    </div>

    <div class="bg-board" id="bg-board">
      <div class="bg-quadrant bg-top-left" id="quadrant-tl"></div>
      <div class="bg-bar" id="bg-bar-top">
        <div class="bg-bar-slots" id="bar-slots-top"></div>
      </div>
      <div class="bg-quadrant bg-top-right" id="quadrant-tr"></div>

      <div class="bg-center">
        <div class="bg-dice-area" id="bg-dice-area"></div>
      </div>

      <div class="bg-quadrant bg-bottom-left" id="quadrant-bl"></div>
      <div class="bg-bar" id="bg-bar-bottom">
        <div class="bg-bar-slots" id="bar-slots-bottom"></div>
      </div>
      <div class="bg-quadrant bg-bottom-right" id="quadrant-br"></div>
    </div>

    <div class="bg-controls">
      <button class="game-btn primary" id="btn-roll" data-i18n="bg_roll">Roll Dice</button>
      <button class="game-btn" id="btn-undo" data-i18n="bg_undo" disabled>Undo</button>
      <button class="game-btn" id="btn-pass" data-i18n="bg_pass" disabled>Pass</button>
      <button class="game-btn" id="btn-reset" data-i18n="bg_new_game">New Game</button>
    </div>

    <p class="game-hint" data-i18n="bg_hint">Roll dice, tap a checker then tap destination. Bear off all 15 to win!</p>
  </div>

  <div id="tablo-footer"></div>

  <div class="winner-modal" id="winner-modal" style="display:none;">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon" id="winner-icon">&#127942;</div>
      <h2 class="winner-title" id="winner-title"></h2>
      <p class="winner-message" id="winner-message"></p>
      <div class="winner-buttons">
        <button class="game-btn primary" id="btn-play-again" data-i18n="btn_play_again">Play Again</button>
      </div>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>
  <script>
    (function() {
      var attempts = 0;
      function loadGame() {
        var s = document.createElement('script');
        s.src = 'game.js';
        s.onload = function() {
          if (typeof window.initGame === 'function') initGame();
        };
        document.body.appendChild(s);
      }
      function check() {
        if (window.TABLO_TRANSLATIONS) { loadGame(); }
        else if (attempts < 50) { attempts++; setTimeout(check, 100); }
        else { loadGame(); }
      }
      check();
    })();
  </script>
</body>
</html>
