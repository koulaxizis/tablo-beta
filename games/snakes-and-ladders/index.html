<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snakes & Ladders — Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <svg style="display: none;" aria-hidden="true">
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/><path d="M12 20v2"/>
      <path d="M2 12h2"/><path d="M20 12h2"/>
      <path d="M4.9 4.9l1.4 1.4"/><path d="M17.7 17.7l1.4 1.4"/>
      <path d="M4.9 19.1l1.4-1.4"/><path d="M17.7 6.3l1.4-1.4"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </symbol>
    <symbol id="icon-dice" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
    </symbol>
  </svg>

  <div class="game-wrapper">
    <div class="sl-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="sl_turn">Turn</span>
        <span class="stat-value" id="turn-indicator">1</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="sl_dice">Dice</span>
        <span class="stat-value" id="dice-value">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="sl_wins">Wins</span>
        <span class="stat-value" id="wins-count">0</span>
      </div>
    </div>

    <div class="sl-board-container">
      <div class="sl-board" id="sl-board">
        <!-- Generated by JS -->
      </div>
      <div class="sl-snakes-ladders" id="sl-snakes-ladders">
        <!-- SVG overlay for snakes and ladders -->
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <!-- Snakes (red lines going down) -->
          <line x1="80" y1="80" x2="120" y2="160" stroke="#ef4444" stroke-width="4" stroke-dasharray="4,4" id="snake-1"/>
          <line x1="280" y1="120" x2="200" y2="280" stroke="#ef4444" stroke-width="4" stroke-dasharray="4,4" id="snake-2"/>
          <line x1="320" y1="80" x2="280" y2="200" stroke="#ef4444" stroke-width="4" stroke-dasharray="4,4" id="snake-3"/>
          
          <!-- Ladders (green lines going up) -->
          <line x1="60" y1="280" x2="80" y2="200" stroke="#22c55e" stroke-width="4" stroke-dasharray="4,4" id="ladder-1"/>
          <line x1="160" y1="320" x2="140" y2="160" stroke="#22c55e" stroke-width="4" stroke-dasharray="4,4" id="ladder-2"/>
          <line x1="240" y1="240" x2="260" y2="80" stroke="#22c55e" stroke-width="4" stroke-dasharray="4,4" id="ladder-3"/>
        </svg>
      </div>
    </div>

    <div class="sl-players" id="sl-players">
      <div class="sl-player" id="player-1">
        <div class="sl-token" style="background: #2dd4bf;"></div>
        <span data-i18n="sl_player_1">Player 1</span>
      </div>
      <div class="sl-player active" id="player-2">
        <div class="sl-token" style="background: #f97316;"></div>
        <span data-i18n="sl_player_2">Player 2</span>
      </div>
    </div>

    <div class="game-controls">
      <button class="game-btn primary" id="btn-roll" data-i18n="sl_roll_dice">Roll Dice</button>
      <button class="game-btn" id="btn-reset" data-i18n="sl_new_game">New Game</button>
    </div>

    <p class="game-hint" data-i18n="sl_hint">Roll the dice to move. First to reach 100 wins! Watch out for snakes (go down) and ladders (go up)!</p>
  </div>

  <div id="tablo-footer"></div>

  <div class="winner-modal" id="winner-modal" style="display:none;">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon" id="winner-icon">&#127942;</div>
      <h2 class="winner-title" id="winner-title"></h2>
      <p class="winner-message" id="winner-message"></p>
      <div class="winner-buttons" id="winner-buttons">
        <button class="game-btn primary" id="btn-play-again" data-i18n="btn_play_again">Play Again</button>
      </div>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>
  <script>
    (function() {
      var attempts = 0;
      function loadGame() {
        var s = document.createElement('script');
        s.src = 'game.js';
        s.onload = function() {
          if (typeof window.initGame === 'function') initGame();
        };
        document.body.appendChild(s);
      }
      function check() {
        if (window.TABLO_TRANSLATIONS) { loadGame(); }
        else if (attempts < 50) { attempts++; setTimeout(check, 100); }
        else { loadGame(); }
      }
      check();
    })();
  </script>
</body>
</html>
