<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku - Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <svg style="display: none;" aria-hidden="true">
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/><path d="M12 20v2"/>
      <path d="M2 12h2"/><path d="M20 12h2"/>
      <path d="M4.9 4.9l1.4 1.4"/><path d="M17.7 17.7l1.4 1.4"/>
      <path d="M4.9 19.1l1.4-1.4"/><path d="M17.7 6.3l1.4-1.4"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06-.06a1.65 1.65 0 00-.33-1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
    </symbol>
  </svg>

  <div class="game-wrapper">
    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="sudoku_time">Time</span>
        <span class="stat-value" id="timer">00:00</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="sudoku_best">Best</span>
        <span class="stat-value" id="best-time">--:--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="sudoku_hints">Hints</span>
        <span class="stat-value" id="hints-display">3</span>
      </div>
    </div>

    <div class="sudoku-board" id="sudoku-board"></div>

    <div class="num-pad" id="num-pad">
      <button class="num-btn" data-n="1">1</button>
      <button class="num-btn" data-n="2">2</button>
      <button class="num-btn" data-n="3">3</button>
      <button class="num-btn" data-n="4">4</button>
      <button class="num-btn" data-n="5">5</button>
      <button class="num-btn" data-n="6">6</button>
      <button class="num-btn" data-n="7">7</button>
      <button class="num-btn" data-n="8">8</button>
      <button class="num-btn" data-n="9">9</button>
      <button class="num-btn num-erase" data-n="0">⌫</button>
    </div>

    <div class="game-controls">
      <select id="difficulty-select" class="mode-select">
        <option value="easy" data-i18n="sudoku_easy">Easy</option>
        <option value="medium" data-i18n="sudoku_medium">Medium</option>
        <option value="hard" data-i18n="sudoku_hard">Hard</option>
      </select>
      <button class="game-btn primary" id="btn-new-game" data-i18n="sudoku_new_game">New Game</button>
      <button class="game-btn" id="btn-undo" data-i18n="sudoku_undo">Undo</button>
    </div>

    <div class="game-controls">
      <button class="game-btn toggle-btn" id="btn-hint" data-i18n="sudoku_hint">Hint</button>
      <button class="game-btn toggle-btn" id="btn-notes" data-i18n="sudoku_notes">Notes</button>
      <button class="game-btn toggle-btn" id="btn-conflicts" data-i18n="sudoku_conflicts">Conflicts</button>
    </div>

    <p class="game-hint" data-i18n="sudoku_hint_text">Tap a cell, then tap a number. Toggle Notes for pencil marks.</p>
  </div>

  <div id="tablo-footer"></div>

  <div class="winner-modal" id="game-over-modal" style="display:none;">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon" id="modal-icon">&#127881;</div>
      <h2 class="winner-title" id="modal-title"></h2>
      <p class="winner-message" id="modal-message"></p>
      <button class="game-btn primary" id="btn-retry" data-i18n="btn_play_again">Play Again</button>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>
  <script>
    (function() {
      var attempts = 0;
      function loadGame() {
        var s = document.createElement('script');
        s.src = 'game.js';
        s.onload = function() {
          if (typeof initGame === 'function') initGame();
        };
        document.body.appendChild(s);
      }
      function check() {
        if (window.TABLO_TRANSLATIONS) {
          loadGame();
        } else if (attempts < 50) {
          attempts++;
          setTimeout(check, 100);
        } else {
          loadGame();
        }
      }
      check();
    })();
  </script>
</body>
</html>
