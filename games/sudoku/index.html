<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku - Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/icons.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <a href="../../index.html" class="back-home mobile-hide">
    <i class="fa fa-arrow-left"></i>
    <span data-i18n="btn_back_home">Back to Games</span>
  </a>

  <div class="game-wrapper">
    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="sudoku_difficulty">Difficulty</span>
        <span class="stat-value" id="diff-display">Medium</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="sudoku_errors">Errors</span>
        <span class="stat-value" id="errors">0/3</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="slider_time">Time</span>
        <span class="stat-value" id="timer">00:00</span>
      </div>
    </div>

    <div class="sudoku-board" id="board"></div>

    <div class="number-pad" id="number-pad"></div>

    <div class="game-controls">
      <select id="difficulty-select" class="diff-select">
        <option value="easy" data-i18n="sudoku_easy">Easy</option>
        <option value="medium" selected data-i18n="sudoku_medium">Medium</option>
        <option value="hard" data-i18n="sudoku_hard">Hard</option>
      </select>
      <button class="game-btn primary" id="btn-new-game" data-i18n="slider_new_game">New Game</button>
      <button class="game-btn" id="btn-hint" data-i18n="lights_hint">Hint</button>
      <button class="game-btn" id="btn-erase" data-i18n="sudoku_erase">Erase</button>
      <button class="game-btn" id="btn-notes" data-i18n="sudoku_notes">Notes</button>
    </div>
  </div>

  <div id="tablo-footer"></div>

  <div class="winner-modal" id="winner-modal">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon">&#127881;</div>
      <h2 class="winner-title" data-i18n="sudoku_solved">Solved!</h2>
      <p class="winner-message" id="winner-stats"></p>
      <button class="game-btn primary" id="btn-next" data-i18n="btn_play_again">Play Again</button>
    </div>
  </div>

  <div class="winner-modal" id="game-over-modal">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon">&#128542;</div>
      <h2 class="winner-title" data-i18n="sudoku_game_over">Game Over</h2>
      <p class="winner-message" data-i18n="sudoku_too_many_errors">Too many errors!</p>
      <button class="game-btn primary" id="btn-retry" data-i18n="slider_new_game">New Game</button>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>

  <script>
    fetch('../../assets/js/translations.json')
            .then(function(r) { return r.json(); })
      .then(function(data) {
        window.TABLO_TRANSLATIONS = data;
        if (typeof window.applyTabloTranslations === 'function') {
          window.applyTabloTranslations();
        }
        var s = document.createElement('script');
        s.src = 'game.js';
        s.onload = function() { if (typeof initGame === 'function') initGame(); };
        document.body.appendChild(s);
      })
      .catch(function(e) { console.error('Load failed:', e); });
  </script>
</body>
</html>
