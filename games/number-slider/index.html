<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Slider - Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/icons.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <a href="../../index.html" class="back-home mobile-hide">
    <i class="fa fa-arrow-left"></i>
    <span data-i18n="btn_back_home">Back to Games</span>
  </a>

  <div class="game-wrapper">
    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="slider_moves">Moves</span>
        <span class="stat-value" id="moves">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="slider_time">Time</span>
        <span class="stat-value" id="timer">00:00</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="slider_best">Best</span>
        <span class="stat-value" id="best-score">--</span>
      </div>
    </div>

    <div class="slider-board" id="board"></div>

    <div class="game-controls">
      <select id="grid-size" class="size-select">
        <option value="3" data-i18n="slider_3x3">3×3 (Easy)</option>
        <option value="4" selected data-i18n="slider_4x4">4×4 (Medium)</option>
        <option value="5" data-i18n="slider_5x5">5×5 (Hard)</option>
      </select>
      <button class="game-btn primary" id="btn-new-game" data-i18n="slider_new_game">New Game</button>
    </div>

    <p class="game-hint" data-i18n="slider_hints">Click tiles adjacent to the empty space to slide them!</p>
  </div>

  <div id="tablo-footer"></div>

  <div class="winner-modal" id="winner-modal">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon">&#127881;</div>
      <h2 class="winner-title" data-i18n="slider_completed">Puzzle Completed!</h2>
      <div class="winner-stats">
        <div class="winner-stat-row">
          <div class="winner-stat">
            <div class="winner-stat-label" data-i18n="slider_moves">Moves</div>
            <div class="winner-stat-value" id="final-moves">0</div>
          </div>
          <div class="winner-stat">
            <div class="winner-stat-label" data-i18n="slider_time">Time</div>
            <div class="winner-stat-value" id="final-time">00:00</div>
          </div>
        </div>
      </div>
      <button class="game-btn primary" id="btn-play-again" data-i18n="btn_play_again">Play Again</button>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>

  <script>
    fetch('../../assets/js/translations.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        window.TABLO_TRANSLATIONS = data;
        if (typeof window.applyTabloTranslations === 'function') {
          window.applyTabloTranslations();
        }
        var gameScript = document.createElement('script');
        gameScript.src = 'game.js';
        gameScript.onload = function() {
          if (typeof initGame === 'function') initGame();
        };
        document.body.appendChild(gameScript);
      })
      .catch(function(e) { console.error('Failed to load:', e); });
  </script>
</body>
</html>
