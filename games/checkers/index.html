<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkers — Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <svg style="display: none;" aria-hidden="true">
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/>
      <path d="M12 20v2"/>
      <path d="M2 12h2"/>
      <path d="M20 12h2"/>
      <path d="M4.9 4.9l1.4 1.4"/>
      <path d="M17.7 17.7l1.4 1.4"/>
      <path d="M4.9 19.1l1.4-1.4"/>
      <path d="M17.7 6.3l1.4-1.4"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
    </symbol>
  </svg>

  <div class="game-wrapper">
    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="checkers_turn">Turn</span>
        <span class="stat-value" id="turn-indicator">Red</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="checkers_pieces_captured">Captured</span>
        <span class="stat-value" id="captured-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="checkers_wins">Wins</span>
        <span class="stat-value" id="wins-count">0</span>
      </div>
    </div>

    <!-- FIXED: Board container MUST have these EXACT IDs -->
    <div class="board-container" id="board-container">
      <div class="checkerboard" id="checkerboard"></div>
      <div class="pieces-overlay" id="pieces-overlay"></div>
    </div>

    <div class="game-controls">
      <button class="game-btn primary" id="btn-new-game" data-i18n="checkers_new_game">New Game</button>
      <button class="game-btn" id="btn-mode" data-i18n="checkers_vs_human">2 Players</button>
    </div>

    <p class="game-hint desktop-only" data-i18n="checkers_hint_desktop">Click piece to select, click highlighted square to move</p>
    <p class="game-hint mobile-only" data-i18n="checkers_hint_mobile">Tap piece to select, tap highlighted square to move</p>
  </div>

  <div id="tablo-footer"></div>

  <!-- FIXED: Modal structure with ALL required IDs -->
  <div class="winner-modal" id="winner-modal" style="display:none;">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon" id="winner-icon">&#127942;</div>
      <h2 class="winner-title" id="winner-title"></h2>
      <p class="winner-message" id="winner-message"></p>
      <div class="winner-buttons" id="winner-buttons">
        <button class="game-btn primary" id="btn-play-again" data-i18n="btn_play_again">Play Again</button>
      </div>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>

  <script>
    (function() {
      var attempts = 0;
      function loadGame() {
        console.log('[Checkers Index] Loading game.js...');
        var s = document.createElement('script');
        s.src = 'game.js';
        s.onload = function() {
          console.log('[Checkers Index] game.js loaded, checking for initGame...');
          if (typeof window.initGame === 'function') {
            console.log('[Checkers Index] Calling initGame...');
            window.initGame();
          } else {
            console.error('[Checkers Index] initGame NOT FOUND after script load!');
          }
        };
        s.onerror = function() {
          console.error('[Checkers Index] FAILED to load game.js!');
        };
        document.body.appendChild(s);
      }
      
      function check() {
        console.log('[Checkers Index] Checking translations...', !!window.TABLO_TRANSLATIONS);
        if (window.TABLO_TRANSLATIONS) {
          loadGame();
        } else if (attempts < 50) {
          attempts++;
          setTimeout(check, 100);
        } else {
          console.warn('[Checkers Index] No translations, loading anyway...');
          loadGame();
        }
      }
      
      console.log('[Checkers Index] Starting initialization...');
      check();
    })();
  </script>
</body>
</html>
