<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris - Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>

  <div id="tablo-header"></div>

  <div class="game-wrapper">
    <div class="tetris-layout">
      <div class="tetris-board-wrap">
        <canvas id="tetris-canvas" width="240" height="480"></canvas>
      </div>
      <div class="tetris-sidebar">
        <div class="tetris-stat">
          <span class="tetris-stat-label" data-i18n="tetris_score">Score</span>
          <span class="tetris-stat-value" id="score">0</span>
        </div>
        <div class="tetris-stat">
          <span class="tetris-stat-label" data-i18n="tetris_lines">Lines</span>
          <span class="tetris-stat-value" id="lines">0</span>
        </div>
        <div class="tetris-stat">
          <span class="tetris-stat-label" data-i18n="tetris_level">Level</span>
          <span class="tetris-stat-value" id="level">1</span>
        </div>
        <div class="tetris-next-block">
          <span class="tetris-stat-label" data-i18n="tetris_next">Next</span>
          <canvas id="next-canvas" width="96" height="96"></canvas>
        </div>
        <div class="game-controls">
          <button class="game-btn primary" id="btn-start" data-i18n="btn_restart">Restart</button>
        </div>
        <div class="tetris-instructions">
          <small>← → Move • ↑ Rotate • ↓ Drop</small>
        </div>
      </div>
    </div>
  </div>

  <div id="tablo-footer"></div>

  <div class="congrats-modal" id="game-over-modal">
    <div class="congrats-overlay"></div>
    <div class="congrats-content">
      <div class="congrats-icon">&#128542;</div>
      <h2 class="congrats-title" data-i18n="tetris_game_over">Game Over!</h2>
      <div class="congrats-stats">
        <div class="congrats-stat-row">
          <div class="congrats-stat">
            <div class="congrats-stat-label" data-i18n="tetris_score">Score</div>
            <div class="congrats-stat-value" id="final-score">0</div>
          </div>
          <div class="congrats-stat">
            <div class="congrats-stat-label" data-i18n="tetris_lines">Lines</div>
            <div class="congrats-stat-value" id="final-lines">0</div>
          </div>
        </div>
      </div>
      <button class="game-btn primary" id="btn-play-again" data-i18n="btn_play_again">Play Again</button>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>
  <script>
    var gameScript = document.createElement('script');
    gameScript.src = 'game.js';
    gameScript.onload = function() {
      if (typeof window.applyTabloTranslations === 'function') {
        window.applyTabloTranslations();
      }
      if (typeof initGame === 'function') {
        initGame();
      }
    };
    document.body.appendChild(gameScript);
  </script>

</body>
</html>
