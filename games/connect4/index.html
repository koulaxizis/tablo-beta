<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect 4 - Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/icons.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>

  <div id="tablo-header"></div>

  <a href="../../index.html" class="back-home">
    <i class="fa fa-arrow-left"></i>
    <span data-i18n="btn_back_home">Back to Games</span>
  </a>

  <div class="game-wrapper">

    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="connect4_player">Player</span>
        <span class="stat-value" id="current-player">1</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="connect4_turn">Turn</span>
        <span class="stat-value" id="turn-status" data-i18n="connect4_your_turn">Your turn</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="connect4_wins">Wins</span>
        <span class="stat-value" id="wins-p1">0</span> / <span id="wins-p2">0</span>
      </div>
    </div>

    <div class="connect4-board" id="board"></div>

    <div class="game-controls">
      <button class="game-btn primary" id="btn-reset" data-i18n="connect4_reset">Reset Game</button>
    </div>

  </div>

  <div id="tablo-footer"></div>

  <!-- Winner Modal -->
  <div class="winner-modal" id="winner-modal">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon" id="winner-icon">🎉</div>
      <h2 class="winner-title" id="winner-title"></h2>
      <p class="winner-message" data-i18n="connect4_winner_msg">Congratulations!</p>
      <div class="winner-stats">
        <div class="winner-stat-row">
          <div class="winner-stat">
            <div class="winner-stat-label">Player 1</div>
            <div class="winner-stat-value" id="final-wins-p1">0</div>
          </div>
          <div class="winner-stat">
            <div class="winner-stat-label">Player 2</div>
            <div class="winner-stat-value" id="final-wins-p2">0</div>
          </div>
        </div>
      </div>
      <button class="game-btn primary" id="btn-play-again" data-i18n="btn_play_again">Play Again</button>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>

  <script>
    fetch('../../assets/js/translations.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        window.TABLO_TRANSLATIONS = data;
        if (typeof window.applyTabloTranslations === 'function') {
          window.applyTabloTranslations();
        }
        var gameScript = document.createElement('script');
        gameScript.src = 'game.js';
        gameScript.onload = function() {
          if (typeof initGame === 'function') {
            initGame();
          }
        };
        document.body.appendChild(gameScript);
      })
      .catch(function(e) { console.error('Failed to load:', e); });
  </script>

</body>
</html>
