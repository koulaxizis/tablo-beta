<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake - Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <svg style="display: none;" aria-hidden="true">
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/>
      <path d="M12 20v2"/>
      <path d="M2 12h2"/>
      <path d="M20 12h2"/>
      <path d="M4.9 4.9l1.4 1.4"/>
      <path d="M17.7 17.7l1.4 1.4"/>
      <path d="M4.9 19.1l1.4-1.4"/>
      <path d="M17.7 6.3l1.4-1.4"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06-.06a1.65 1.65 0 00-.33-1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
    </symbol>
  </svg>

  <div class="game-wrapper">
    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="snake_score">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="snake_best">Best</span>
        <span class="stat-value" id="best-score">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="snake_length">Length</span>
        <span class="stat-value" id="length">3</span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="snake-canvas" width="360" height="360"></canvas>
    </div>

    <div class="game-controls">
      <button class="game-btn primary" id="btn-start" data-i18n="snake_start">Start</button>
      <button class="game-btn" id="btn-pause" data-i18n="snake_pause">Pause</button>
    </div>

    <p class="game-hint desktop-only" data-i18n="snake_use_arrows">Use arrow keys or WASD to move</p>
    <p class="game-hint mobile-only" data-i18n="snake_swipe_to_move">Swipe to move</p>

    <div class="mobile-dpad" id="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">&#9650;</button>
      <button class="dpad-btn dpad-left" data-dir="left">&#9664;</button>
      <button class="dpad-btn dpad-right" data-dir="right">&#9654;</button>
      <button class="dpad-btn dpad-down" data-dir="down">&#9660;</button>
    </div>
  </div>

  <div id="tablo-footer"></div>

  <div class="winner-modal" id="game-over-modal">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon">&#128014;</div>
      <h2 class="winner-title" data-i18n="snake_game_over">Game Over!</h2>
      <p class="winner-message" id="final-score"></p>
      <button class="game-btn primary" id="btn-retry" data-i18n="btn_play_again">Play Again</button>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>

  <script>
    var gameScript = document.createElement('script');
    gameScript.src = 'game.js';
    gameScript.onload = function() {
      if (typeof window.applyTabloTranslations === 'function') {
        window.applyTabloTranslations();
      }
      if (typeof initGame === 'function') {
        initGame();
      }
    };
    document.body.appendChild(gameScript);
  </script>
</body>
</html>
