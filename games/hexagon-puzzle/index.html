<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexagon Puzzle - Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <div class="game-wrapper">
    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="hex_moves">Moves</span>
        <span class="stat-value" id="hex-moves">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="hex_par">Par</span>
        <span class="stat-value" id="hex-par">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="hex_best">Best</span>
        <span class="stat-value" id="hex-best">--</span>
      </div>
    </div>

    <div class="hex-canvas-wrapper">
      <canvas id="hex-canvas" width="420" height="400"></canvas>
    </div>

    <div class="hex-color-picker" id="hex-color-picker"></div>

    <div class="game-controls">
      <button class="game-btn primary" id="btn-new-game" data-i18n="hex_new_game">New Game</button>
    </div>

    <p class="game-hint" data-i18n="hex_hint">Pick a color to flood the board from the center. Fill all hexes with one color!</p>
  </div>

  <div id="tablo-footer"></div>

  <div class="winner-modal" id="hex-winner" style="display:none;">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon">&#127881;</div>
      <h2 class="winner-title" data-i18n="hex_solved">Solved!</h2>
      <p class="winner-message" id="hex-winner-stats"></p>
      <button class="game-btn primary" id="btn-next" data-i18n="btn_play_again">Play Again</button>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>
  <script>
    (function() {
      var attempts = 0;
      function loadGame() {
        var s = document.createElement('script');
        s.src = 'game.js';
        s.onload = function() {
          if (typeof initGame === 'function') initGame();
        };
        document.body.appendChild(s);
      }
      function check() {
        if (window.TABLO_TRANSLATIONS) {
          loadGame();
        } else if (attempts < 50) {
          attempts++;
          setTimeout(check, 100);
        } else {
          loadGame();
        }
      }
      check();
    })();
  </script>
</body>
</html>
