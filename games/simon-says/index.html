<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Says - Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/icons.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <a href="../../index.html" class="back-home mobile-hide">
    <i class="fa fa-arrow-left"></i>
    <span data-i18n="btn_back_home">Back to Games</span>
  </a>

  <div class="game-wrapper">
    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="simon_score">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="simon_best">Best</span>
        <span class="stat-value" id="best-score">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="simon_round">Round</span>
        <span class="stat-value" id="round">1</span>
      </div>
    </div>

    <div class="simon-board" id="board">
      <div class="simon-button green" data-color="green" id="btn-green"></div>
      <div class="simon-button red" data-color="red" id="btn-red"></div>
      <div class="simon-button yellow" data-color="yellow" id="btn-yellow"></div>
      <div class="simon-button blue" data-color="blue" id="btn-blue"></div>
    </div>

    <div class="center-area">
      <div class="start-button" id="btn-start">
        <i class="fa fa-play"></i>
        <span data-i18n="simon_start">Start</span>
      </div>
      <p class="game-instruction" data-i18n="simon_instruction">Watch the pattern, then repeat it!</p>
    </div>
  </div>

  <div id="tablo-footer"></div>

  <div class="winner-modal" id="game-over-modal">
    <div class="winner-overlay"></div>
    <div class="winner-content">
      <div class="winner-icon">🎮</div>
      <h2 class="winner-title" data-i18n="simon_game_over">Game Over!</h2>
      <p class="winner-message" id="final-score-msg"></p>
      <button class="game-btn primary" id="btn-retry" data-i18n="simon_try_again">Try Again</button>
    </div>
  </div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>

  <script>
    fetch('../../assets/js/translations.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        window.TABLO_TRANSLATIONS = data;
        if (typeof window.applyTabloTranslations === 'function') {
          window.applyTabloTranslations();
        }
        var gameScript = document.createElement('script');
        gameScript.src = 'game.js';
        gameScript.onload = function() {
          if (typeof initGame === 'function') initGame();
        };
        document.body.appendChild(gameScript);
      })
      .catch(function(e) { console.error('Failed to load:', e); });
  </script>
</body>
</html>
