<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors — Tablo</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0f1923">
</head>
<body>
  <div id="tablo-header"></div>

  <svg style="display: none;" aria-hidden="true">
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/><path d="M12 20v2"/>
      <path d="M2 12h2"/><path d="M20 12h2"/>
      <path d="M4.9 4.9l1.4 1.4"/><path d="M17.7 17.7l1.4 1.4"/>
      <path d="M4.9 19.1l1.4-1.4"/><path d="M17.7 6.3l1.4-1.4"/>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
    </symbol>
    <symbol id="icon-rock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="9"/>
      <circle cx="9" cy="10" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="15" cy="10" r="1.5" fill="currentColor" stroke="none"/>
      <path d="M8 15q4 3 8 0"/>
    </symbol>
    <symbol id="icon-paper" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="5" y="3" width="14" height="18" rx="2"/>
      <line x1="8" y1="8" x2="16" y2="8"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
      <line x1="8" y1="16" x2="13" y2="16"/>
    </symbol>
    <symbol id="icon-scissors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="6" cy="6" r="3"/>
      <circle cx="6" cy="18" r="3"/>
      <line x1="8.5" y1="7.5" x2="20" y2="18"/>
      <line x1="8.5" y1="16.5" x2="20" y2="6"/>
    </symbol>
  </svg>

  <div class="game-wrapper">
    <div class="game-stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="rps_wins">Wins</span>
        <span class="stat-value" id="wins-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="rps_losses">Losses</span>
        <span class="stat-value" id="losses-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label" data-i18n="rps_draws">Draws</span>
        <span class="stat-value" id="draws-count">0</span>
      </div>
    </div>

    <div class="rps-arena" id="rps-arena">
      <div class="rps-player">
        <div class="rps-hand" id="player-hand">
          <svg viewBox="0 0 24 24"><use href="#icon-rock"/></svg>
        </div>
        <span class="rps-label" data-i18n="rps_you">YOU</span>
      </div>
      <div class="rps-vs" id="rps-result">VS</div>
      <div class="rps-player">
        <div class="rps-hand" id="ai-hand">
          <svg viewBox="0 0 24 24"><use href="#icon-rock"/></svg>
        </div>
        <span class="rps-label" data-i18n="rps_ai">AI</span>
      </div>
    </div>

    <div class="rps-choices">
      <button class="rps-choice-btn" data-choice="rock">
        <svg viewBox="0 0 24 24"><use href="#icon-rock"/></svg>
        <span data-i18n="rps_rock">Rock</span>
      </button>
      <button class="rps-choice-btn" data-choice="paper">
        <svg viewBox="0 0 24 24"><use href="#icon-paper"/></svg>
        <span data-i18n="rps_paper">Paper</span>
      </button>
      <button class="rps-choice-btn" data-choice="scissors">
        <svg viewBox="0 0 24 24"><use href="#icon-scissors"/></svg>
        <span data-i18n="rps_scissors">Scissors</span>
      </button>
    </div>

    <div class="game-controls">
      <button class="game-btn" id="btn-reset" data-i18n="rps_reset_score">Reset Score</button>
    </div>

    <p class="game-hint" data-i18n="rps_hint">Pick your weapon! Rock beats scissors, scissors beats paper, paper beats rock.</p>
  </div>

  <div id="tablo-footer"></div>

  <div class="tablo-toast" id="toast"></div>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/header.js"></script>
  <script src="../../assets/js/footer.js"></script>
  <script>
    (function() {
      var attempts = 0;
      function loadGame() {
        var s = document.createElement('script');
        s.src = 'game.js';
        s.onload = function() {
          if (typeof window.initGame === 'function') initGame();
        };
        document.body.appendChild(s);
      }
      function check() {
        if (window.TABLO_TRANSLATIONS) { loadGame(); }
        else if (attempts < 50) { attempts++; setTimeout(check, 100); }
        else { loadGame(); }
      }
      check();
    })();
  </script>
</body>
</html>
